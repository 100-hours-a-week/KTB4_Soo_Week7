<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버그도감 - 로그인</title>
    
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="../../styles/bugdex-theme.css">
</head>
<body>

    <header class="main-header">
        <div class="header-title">버그도감</div>
    </header>

    <main class="login-container">
        <h2>디버거 로그인</h2>
        
        <form id="login-form">
            <div class="input-group">
                <label for="email-input">이메일</label>
                <input type="email" id="email-input" placeholder="이메일을 입력하세요">
                <p id="email-error" class="error-text"></p> 
            </div>

            <div class="input-group">
                <label for="password-input">비밀번호</label>
                <input type="password" id="password-input" placeholder="비밀번호를 입력하세요">
                <p id="password-error" class="error-text"></p>
            </div>

            <button type="submit" id="login-submit-btn">도감 열기</button>
        </form>

        <div class="signup-link-wrap">
            <a href="../signup/index.html" id="signup-link">새 디버거 등록</a>
        </div>
    </main>

    <script src="./login.js"></script>
</body>
</html>
