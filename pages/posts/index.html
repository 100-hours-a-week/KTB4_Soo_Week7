<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 게시글 목록</title>
    <link rel="stylesheet" href="./posts.css">
</head>
<body>
    <header class="main-header">
        <div class="header-title">아무 말 대잔치</div>

        <nav class="profile-menu" aria-label="회원 메뉴">
            <button type="button" class="header-profile-button" aria-label="회원 메뉴 열기">
                <span class="header-avatar" aria-hidden="true"></span>
            </button>

            <ul class="profile-dropdown">
                <li><a href="../profile-edit/index.html">회원정보수정</a></li>
                <li><a href="../password-edit/index.html">비밀번호수정</a></li>
                <li><a href="../login/index.html">로그아웃</a></li>
            </ul>
        </nav>
    </header>

    <main class="posts-container">
        <section class="posts-hero">
            <div class="posts-hero-text">
                <p class="posts-welcome">안녕하세요,</p>
                <p class="posts-desc">아무 말 대잔치 게시판 입니다.</p>
            </div>
            <button type="button" id="create-post-btn" class="create-post-btn">게시글 작성</button>
        </section>

        <section class="posts-list" id="posts-list">
            <article class="posts-empty">게시글을 불러오는 중입니다...</article>
        </section>
    </main>

    <script src="./posts.js"></script>
</body>
</html>
