<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 비밀번호 수정</title>

    <link rel="stylesheet" href="./password-edit.css">
</head>
<body>
    <header class="main-header">
        <div class="header-title">아무 말 대잔치</div>

        <nav class="profile-menu" aria-label="회원 메뉴">
            <button type="button" class="header-profile-button" aria-label="회원 메뉴 열기">
                <span class="header-avatar" aria-hidden="true"></span>
            </button>

            <ul class="profile-dropdown">
                <li><a href="../profile-edit/index.html">회원정보수정</a></li>
                <li><a href="./index.html">비밀번호수정</a></li>
                <li><a href="../login/index.html">로그아웃</a></li>
            </ul>
        </nav>
    </header>

    <main class="password-edit-container">
        <h2>비밀번호 수정</h2>

        <form id="password-edit-form">
            <div class="password-form-panel">
                <div class="input-group">
                    <label for="password-input">비밀번호</label>
                    <input type="password" id="password-input" placeholder="비밀번호를 입력하세요">
                    <p id="password-error" class="error-text">* helper text</p>
                </div>

                <div class="input-group">
                    <label for="password-confirm-input">비밀번호 확인</label>
                    <input type="password" id="password-confirm-input" placeholder="비밀번호를 한번 더 입력하세요">
                    <p id="password-confirm-error" class="error-text">* helper text</p>
                </div>
            </div>

            <button type="submit" id="password-edit-submit-btn">수정하기</button>
        </form>
    </main>

    <script src="./password-edit.js"></script>
</body>
</html>
