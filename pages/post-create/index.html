<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버그도감 - 버그 등록</title>

    <link rel="stylesheet" href="./post-create.css">
    <link rel="stylesheet" href="../../styles/bugdex-theme.css">
</head>
<body>
    <header class="main-header">
        <a class="back-link" href="../posts/index.html" aria-label="게시글 목록으로 이동">‹</a>
        <div class="header-title">버그도감</div>

        <nav class="profile-menu" aria-label="회원 메뉴">
            <button type="button" class="header-profile-button" aria-label="회원 메뉴 열기">
                <span class="header-avatar" aria-hidden="true"></span>
            </button>

            <ul class="profile-dropdown">
                <li><a href="../profile-edit/index.html">회원정보수정</a></li>
                <li><a href="../password-edit/index.html">비밀번호수정</a></li>
                <li><a href="../login/index.html">로그아웃</a></li>
            </ul>
        </nav>
    </header>

    <main class="post-create-container">
        <h2>버그 등록</h2>

        <form id="post-create-form">
            <div class="form-group title-group">
                <label for="title-input">제목*</label>
                <input type="text" id="title-input" maxlength="26" placeholder="발견한 버그를 한 문장으로 적어주세요. (최대 26자)">
            </div>

            <div class="form-group content-group">
                <label for="content-input">내용*</label>
                <textarea id="content-input" placeholder="어디서 발견했고, 어떤 현상이 발생했나요?"></textarea>
                <p id="post-error" class="error-text">* helper text</p>
            </div>

            <div class="image-group">
                <label for="image-input">에러 화면</label>
                <div class="file-row">
                    <input type="file" id="image-input" accept="image/*">
                </div>
            </div>

            <button type="submit" id="post-submit-btn">도감에 등록</button>
        </form>
    </main>

    <script type="module" src="./post-create.js"></script>
</body>
</html>
