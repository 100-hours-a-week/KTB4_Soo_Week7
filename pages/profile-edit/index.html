<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버그도감 - 디버거 프로필</title>

    <link rel="stylesheet" href="./profile-edit.css">
    <link rel="stylesheet" href="../../styles/bugdex-theme.css">
</head>
<body>
    <header class="main-header">
        <div class="header-title">버그도감</div>

        <nav class="profile-menu" aria-label="회원 메뉴">
            <button type="button" class="header-profile-button" aria-label="회원 메뉴 열기">
                <span class="header-avatar" aria-hidden="true"></span>
            </button>

            <ul class="profile-dropdown">
                <li><a href="./index.html">회원정보수정</a></li>
                <li><a href="../password-edit/index.html">비밀번호수정</a></li>
                <li><a href="../login/index.html">로그아웃</a></li>
            </ul>
        </nav>
    </header>

    <main class="edit-profile-container">
        <h2>디버거 프로필</h2>

        <section class="profile-image-section" aria-labelledby="profile-image-label">
            <div id="profile-image-label" class="profile-image-label">프로필 사진*</div>

            <button type="button" class="profile-image-button" aria-label="프로필 사진 변경">
                <span class="profile-placeholder" aria-hidden="true"></span>
                <span class="profile-change-text">변경</span>
            </button>
        </section>

        <form id="profile-edit-form">
            <div class="form-panel">
                <div class="field-group">
                    <div class="field-label">이메일</div>
                    <p id="email-text" class="email-text">startupcode@gmail.com</p>
                </div>

                <div class="field-group">
                    <label for="nickname-input">닉네임</label>
                    <input type="text" id="nickname-input" value="">
                    <p id="nickname-error" class="error-text">* helper text</p>
                </div>
            </div>

            <button type="submit" id="edit-submit-btn">수정하기</button>
        </form>

        <button type="button" class="withdraw-button">회원 탈퇴</button>

        <div class="toast-message">수정완료</div>
    </main>

    <div class="modal-overlay" aria-hidden="true">
        <section class="withdraw-modal" role="dialog" aria-labelledby="withdraw-title" aria-describedby="withdraw-description">
            <h2 id="withdraw-title">회원탈퇴 하시겠습니까?</h2>
            <p id="withdraw-description">작성된 게시글과 댓글은 삭제됩니다.</p>

            <div class="modal-actions">
                <button type="button" class="modal-cancel-button">취소</button>
                <button type="button" class="modal-confirm-button">확인</button>
            </div>
        </section>
    </div>

    <script type="module" src="./profile-edit.js"></script>
</body>
</html>
