<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 회원가입</title>

    <link rel="stylesheet" href="./signup.css">
</head>
<body>
    <header class="main-header">
        <a class="back-link" href="../login/index.html" aria-label="로그인 페이지로 이동">‹</a>
        <div class="header-title">아무 말 대잔치</div>
    </header>

    <main class="signup-container">
        <h2>회원가입</h2>

        <section class="profile-section" aria-labelledby="profile-label">
            <div id="profile-label" class="profile-label">프로필 사진</div>
            <p class="error-text">* helper text</p>

            <button type="button" class="profile-upload-button" aria-label="프로필 사진 추가">
                <span aria-hidden="true">+</span>
            </button>
        </section>

        <form id="signup-form">
            <div class="input-group">
                <label for="email-input">이메일*</label>
                <input type="email" id="email-input" placeholder="이메일을 입력하세요">
                <p class="error-text">* helper text</p>
            </div>

            <div class="input-group">
                <label for="password-input">비밀번호*</label>
                <input type="password" id="password-input" placeholder="비밀번호를 입력하세요">
                <p class="error-text">* helper text</p>
            </div>

            <div class="input-group">
                <label for="password-confirm-input">비밀번호 확인*</label>
                <input type="password" id="password-confirm-input" placeholder="비밀번호를 한번 더 입력하세요">
                <p class="error-text">* helper text</p>
            </div>

            <div class="input-group">
                <label for="nickname-input">닉네임*</label>
                <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요">
                <p class="error-text">* helper text</p>
            </div>

            <button type="submit" id="signup-submit-btn">회원가입</button>
        </form>

        <a class="login-link" href="../login/index.html">로그인하러 가기</a>
    </main>
</body>
</html>
