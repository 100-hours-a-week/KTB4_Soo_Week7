<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버그도감 - 관찰 기록</title>

    <link rel="stylesheet" href="./post-detail.css">
    <link rel="stylesheet" href="../../styles/bugdex-theme.css">
</head>
<body>
    <header class="main-header">
        <a class="back-link" href="../posts/index.html" aria-label="게시글 목록으로 이동">‹</a>
        <div class="header-title">버그도감</div>

        <nav class="profile-menu" aria-label="회원 메뉴">
            <button type="button" class="header-profile-button" aria-label="회원 메뉴 열기">
                <span class="header-avatar" aria-hidden="true"></span>
            </button>

            <ul class="profile-dropdown">
                <li><a href="../profile-edit/index.html">회원정보수정</a></li>
                <li><a href="../password-edit/index.html">비밀번호수정</a></li>
                <li><a href="../login/index.html">로그아웃</a></li>
            </ul>
        </nav>
    </header>

    <main class="post-detail-container">
        <article class="post-detail">
            <header class="post-head">
                <h1 id="post-title">게시글을 불러오는 중입니다.</h1>
                <div class="post-meta-row">
                    <div class="post-author">
                        <span class="author-avatar" aria-hidden="true"></span>
                        <strong id="post-author">작성자</strong>
                        <time id="post-date">-</time>
                    </div>
                    <div class="post-actions">
                        <button type="button" id="post-edit-btn">수정</button>
                        <button type="button" id="post-delete-btn">삭제</button>
                    </div>
                </div>
            </header>

            <div id="post-image" class="post-image" aria-label="게시글 이미지"></div>
            <p id="post-content" class="post-content"></p>

            <section class="post-stats" aria-label="게시글 통계">
                <button type="button" id="like-btn" class="stat-box">
                    <strong id="like-count">0</strong>
                    <span>나도 목격</span>
                </button>
                <div class="stat-box">
                    <strong id="view-count">0</strong>
                    <span>관찰 횟수</span>
                </div>
                <div class="stat-box">
                    <strong id="comment-count">0</strong>
                    <span>해결 단서</span>
                </div>
            </section>
        </article>

        <section class="comment-panel">
            <form id="comment-form">
                <textarea id="comment-input" placeholder="해결 방법이나 단서를 남겨주세요!"></textarea>
                <div class="comment-form-footer">
                    <button type="submit" id="comment-submit-btn">단서 등록</button>
                </div>
            </form>
        </section>

        <section id="comments-list" class="comments-list" aria-label="댓글 목록"></section>
    </main>

    <div id="delete-post-modal" class="modal-overlay" aria-hidden="true">
        <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="delete-post-title">
            <h2 id="delete-post-title">게시글을 삭제하시겠습니까?</h2>
            <p>삭제한 내용은 복구 할 수 없습니다.</p>
            <div class="modal-actions">
                <button type="button" class="cancel-btn" data-close-modal>취소</button>
                <button type="button" class="confirm-btn" id="confirm-post-delete-btn">확인</button>
            </div>
        </div>
    </div>

    <div id="delete-comment-modal" class="modal-overlay" aria-hidden="true">
        <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="delete-comment-title">
            <h2 id="delete-comment-title">댓글을 삭제하시겠습니까?</h2>
            <p>삭제한 내용은 복구 할 수 없습니다.</p>
            <div class="modal-actions">
                <button type="button" class="cancel-btn" data-close-modal>취소</button>
                <button type="button" class="confirm-btn" id="confirm-comment-delete-btn">확인</button>
            </div>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="./post-detail.js"></script>
</body>
</html>
